<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
		/>
		<link rel="stylesheet" href="style.css" />
		<title>Controle de Estoque Riomar Cordas</title>
	</head>
	<body class="bg-light">
		<div class="container mt-3 mb-4 d-flex gap-2">
			<a
				href="cadastro-material.html"
				class="btn btn-success d-inline-flex align-items-center shadow-sm"
			>
				<i class="bi bi-plus-lg me-2"></i> Cadastrar Novo Material
			</a>
			<a
				href="movimenta-material.html"
				class="btn btn-primary d-inline-flex align-items-center shadow-sm"
			>
				<i class="bi bi-arrow-left-right me-2"></i> Alterar / Excluir
				Material
			</a>
		</div>
		<div class="container py-5">
			<div class="card shadow-sm p-4 mb-4">
				<h1 class="text-primary h3 mb-4">
					📦 Gerenciador de Estoque - Riomar
				</h1>

				<form id="form-busca-dados" class="row g-3">
					<div class="col-md-5">
						<label class="form-label fw-bold"
							>Código Numérico</label
						>
						<input
							id="codigoNumerico"
							type="number"
							class="form-control"
							placeholder="Mínimo 3 dígitos"
						/>
					</div>
					<div class="col-md-5">
						<label class="form-label fw-bold"
							>Data de Cadastro</label
						>
						<input
							id="dataMaterial"
							type="date"
							class="form-control"
						/>
					</div>
					<div class="col-md-2 d-flex align-items-end">
						<button
							id="btn-submit"
							type="submit"
							class="btn btn-primary w-100"
						>
							Buscar
						</button>
					</div>
				</form>
			</div>

			<div id="erroEstoqueVazio"></div>

			<div class="card shadow-sm border-0">
				<div
					class="card-header bg-dark text-white d-flex justify-content-between align-items-center py-3"
				>
					<h2 class="h5 mb-0 fw-bold">
						<i class="bi bi-box-seam me-2"></i>Materiais em Estoque
					</h2>
				</div>
				<div id="lista-de-estoque" class="row g-4 mt-2"></div>
			</div>
		</div>
		<script type="module" src="../../js/lista-estoque.js"></script>
	</body>
</html>
