<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="style.css" />
		<title>Controle de Estoque Riomar Cordas</title>
	</head>
	<body class="bg-light">
		<div class="container py-5">
			<div class="card shadow-sm p-4 mb-4">
				<h1 class="text-primary h3 mb-4">
					📦 Gerenciador de Estoque - Riomar
				</h1>

				<form id="form-busca-dados" class="row g-3">
					<div class="col-md-5">
						<label class="form-label fw-bold"
							>Código Numérico</label
						>
						<input
							id="codigoNumerico"
							type="number"
							class="form-control"
							placeholder="Mínimo 3 dígitos"
						/>
					</div>
					<div class="col-md-5">
						<label class="form-label fw-bold"
							>Data de Cadastro</label
						>
						<input
							id="dataMaterial"
							type="date"
							class="form-control"
						/>
					</div>
					<div class="col-md-2 d-flex align-items-end">
						<button
							id="btn-submit"
							type="submit"
							class="btn btn-primary w-100"
						>
							Buscar
						</button>
					</div>
				</form>
			</div>

			<div id="erroEstoqueVazio"></div>

			<div class="card shadow-sm border-0">
				<div
					class="card-header bg-dark text-white d-flex justify-content-between align-items-center py-3"
				>
					<h2 class="h5 mb-0 fw-bold">
						<i class="bi bi-box-seam me-2"></i>Materiais em Estoque
					</h2>
				</div>
				<div class="table-responsive">
					<table
						id="lista-de-estoque"
						class="table table-hover align-middle mb-0"
					>
						<thead class="table-light">
							<tr>
								<th
									class="ps-4 text-secondary text-uppercase small fw-bolder"
									style="width: 20%"
								>
									Código
								</th>
								<th
									class="text-secondary text-uppercase small fw-bolder"
									style="width: 50%"
								>
									Descrição do Material
								</th>
								<th
									class="text-secondary text-uppercase small fw-bolder text-center"
									style="width: 30%"
								>
									Saldo Atual
								</th>
							</tr>
						</thead>
						<tbody class="border-top-0"></tbody>
					</table>
				</div>
			</div>
		</div>
		<script type="module" src="../../js/lista-estoque.js"></script>
	</body>
</html>
