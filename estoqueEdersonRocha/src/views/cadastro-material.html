<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
		/>
		<link rel="stylesheet" href="style.css" />
		<title>Cadastro de Material</title>
	</head>
	<body class="bg-light">
		<div class="container mt-3 mb-4 d-flex gap-2 justify-content-center">
			<a
				href="index.html"
				class="btn btn-secondary d-inline-flex align-items-center shadow-sm"
			>
				<i class="bi bi-list-ul me-2"></i> Lista de Estoque
			</a>
			<a
				href="movimenta-material.html"
				class="btn btn-primary d-inline-flex align-items-center shadow-sm"
			>
				<i class="bi bi-arrow-left-right me-2"></i> Alterar / Excluir
				Material
			</a>
		</div>
		<div class="container py-5 d-flex justify-content-center">
			<div class="card shadow" style="max-width: 500px; width: 100%">
				<div class="card-body p-4">
					<h1 class="h3 mb-4 text-center">🆕 Cadastro de Material</h1>

					<form id="cadastroMaterial">
						<div class="mb-3">
							<label
								for="codigoNumerico"
								class="form-label fw-bold"
								>Código Numérico</label
							>
							<input
								id="codigoNumerico"
								type="number"
								class="form-control"
								required
							/>
						</div>
						<div class="mb-3">
							<label for="nomeMaterial" class="form-label fw-bold"
								>Nome do Material</label
							>
							<input
								id="nomeMaterial"
								type="text"
								class="form-control"
								required
							/>
						</div>
						<div class="mb-3">
							<label for="saldoEstoque" class="form-label fw-bold"
								>Quantidade Inicial</label
							>
							<input
								id="saldoEstoque"
								type="number"
								class="form-control"
								required
							/>
						</div>
						<button
							id="btn-submit-cadastro"
							type="submit"
							class="btn btn-success w-100 py-2"
						>
							Cadastrar no Sistema
						</button>
					</form>

					<div id="erroCadastro" class="mt-3"></div>
				</div>
			</div>
		</div>
		<script type="module" src="../../js/cadastra.js"></script>
	</body>
</html>
