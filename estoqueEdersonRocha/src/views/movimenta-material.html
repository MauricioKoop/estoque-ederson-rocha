<!doctype html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
		/>
		<link rel="stylesheet" href="style.css" />
		<title>Movimenta Material</title>
	</head>
	<body class="bg-light">
		<div class="container mt-3 mb-4 d-flex gap-2 justify-content-center">
			<a
				href="index.html"
				class="btn btn-secondary d-inline-flex align-items-center shadow-sm"
			>
				<i class="bi bi-list-ul me-2"></i> Voltar para a Lista
			</a>
			<a
				href="cadastro-material.html"
				class="btn btn-success d-inline-flex align-items-center shadow-sm"
			>
				<i class="bi bi-plus-lg me-2"></i> Cadastrar Novo Material
			</a>
		</div>
		<div class="container py-5">
			<h1 class="text-center mb-5 h2 text-uppercase fw-bold">
				🔄 Movimentação de Estoque
			</h1>

			<div id="feedback-container" class="mb-4"></div>

			<div class="row g-4">
				<div class="col-md-4">
					<div class="card h-100 shadow-sm">
						<div class="card-body">
							<h5
								class="card-title text-primary border-bottom pb-2"
							>
								Alterar Nome
							</h5>
							<form id="form-alterar-nome">
								<div class="mb-2">
									<input
										type="number"
										id="id-nome"
										class="form-control"
										placeholder="Cód. Numérico"
										required
									/>
								</div>
								<div class="mb-2">
									<input
										type="text"
										id="novo-nome"
										class="form-control"
										placeholder="Novo Nome"
										required
									/>
								</div>
								<button
									type="submit"
									class="btn btn-outline-primary w-100"
								>
									Atualizar
								</button>
							</form>
						</div>
					</div>
				</div>

				<div class="col-md-4">
					<div class="card h-100 shadow-sm border-warning">
						<div class="card-body">
							<h5
								class="card-title text-warning border-bottom pb-2"
							>
								Saída de Estoque
							</h5>
							<form id="form-subtrair-estoque">
								<div class="mb-2">
									<input
										type="number"
										id="id-estoque"
										class="form-control"
										placeholder="Cód. Numérico"
										required
									/>
								</div>
								<div class="mb-2">
									<input
										type="number"
										id="qtd-subtrair"
										class="form-control"
										placeholder="Qtd a remover"
										required
										min="1"
									/>
								</div>
								<button
									type="submit"
									class="btn btn-warning w-100"
								>
									Dar Baixa
								</button>
							</form>
						</div>
					</div>
				</div>

				<div class="col-md-4">
					<div class="card h-100 shadow-sm border-danger">
						<div class="card-body">
							<h5
								class="card-title text-danger border-bottom pb-2"
							>
								Excluir Registro
							</h5>
							<form id="form-excluir-material">
								<div class="mb-3">
									<input
										type="number"
										id="id-excluir"
										class="form-control"
										placeholder="Cód. Numérico"
										required
									/>
								</div>
								<button
									type="submit"
									class="btn btn-danger w-100"
								>
									Excluir para Sempre
								</button>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
		<script type="module" src="../../js/movimenta.js"></script>
	</body>
</html>
